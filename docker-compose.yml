version: "3.7"
services:
  app:
    build:
      args:
        user: ksn38
        uid: 1000
      context: ./
      dockerfile: Dockerfile
    image: ms4
    container_name: ms4-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
    networks:
      - ms4-network

  db:
    image: mysql:5.7
    container_name: ms4-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - ./docker-compose/mysql:/var/lib/mysql
    networks:
      - ms4-network
    ports:
      - "3306:3306"

  nginx:
    image: nginx:alpine
    container_name: ms4-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - ms4-network

networks:
  ms4-network:
    driver: bridge
