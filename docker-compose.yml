version: "3.7"
services:
  app:
    build:
      args:
        user: ksn38
        uid: 1001
      context: ./
      dockerfile: Dockerfile
    image: ms3
    container_name: ms3-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
    networks:
      - ms3-network

  db:
    image: mysql:5.7
    container_name: ms3-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - ./docker-compose/mysql:/docker-entrypoint-initdb.d
    networks:
      - ms3-network

  nginx:
    image: nginx:alpine
    container_name: ms3-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - ms3-network

networks:
  ms3-network:
    driver: bridge
